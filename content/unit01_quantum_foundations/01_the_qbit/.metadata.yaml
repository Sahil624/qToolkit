# METADATA FILE LOGIC
#
# This file describes a learning notebook from two distinct perspectives:
#
# 1. learning_objective_tree:
#    - This section defines the high-level pedagogical goals (Learning Objectives or LOs) of the notebook.
#    - It models the conceptual dependency between these LOs using the 'prerequisites' field, creating a "tree" of knowledge.
#    - Each LO is linked to the specific, granular content cells that fulfill it via the 'covered_by' field.
#
# 2. cell_metadata:
#    - This section defines the physical, sequential layout of the notebook's content cells as a student would see them.
#    - Each cell has a unique 'cell_id' and an 'order' field to specify its linear position.
#
# The 'cell_id's serve as the bridge, linking the abstract pedagogical structure (the tree)
# to the concrete physical layout (the ordered list of cells).

learning_objective_tree:
  - lo_id: "LO-INTRO"
    summary: "Notebook introduction and content lookup."
    learning_objectives:
      - "Students will be able to model two level quantum systems using vector and ket representations."
      - "Students will understand the notions qubit, amplitude and probability of collapse."
      - "Students will understand the notion of superposition."
      - "Students will be able to change between basis representations for a given qubit."
    kolb_phase: "N/A"
    estimated_time_mins: 1
    prerequisites: []
    keywords:
      - "introduction"
      - "lookup"
      - "table of contents"
    content_type:
      - "reading"
    difficulty: "beginner"
