learning_objective_tree:
  title: General Single-Qubit Measurement
  global_prerequisites:
  - Linear Algebra
  - Complex Numbers
  - Quantum Mechanics Fundamentals
  objectives:
  - lo_id: LO-13-01
    summary: Students will understand the theory behind projective measurements.
    covered_by:
    - m13-QuantumMeasurements
    - m13-ComputingTheProjection
    learning_objectives:
    - Introduce the general theory behind single-qubit measurements in quantum mechanics
    - Differentiate between the three types of quantum measurements
    - Focus on understanding projective or von Neumann measurements
    - Compute the projection of a qubit onto a basis state
    - Apply the concept of orthonormal basis to simplify the projection computation
    - Understand the mathematical representation of qubit projection on pure states
    estimated_time_mins: 2
    concepts:
    - Projection
    - Quantum Measurements
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-13-02
    summary: Students will understand the measurement postulate in quantum mechanics
      for projective measurements.
    covered_by:
    - m13-ComputingTheProjection
    - m13-TheProjectionOperators
    - m13-MeasurementOperatorIdentity
    - m13-ExampleProjectionOperators
    - m13-ApplyingProjectionOperators
    learning_objectives:
    - Compute the projection of a qubit onto a basis state
    - Apply the concept of orthonormal basis to simplify the projection computation
    - Understand the mathematical representation of qubit projection on pure states
    - Define and understand the concept of a projection operator in quantum mechanics
    - Apply projection operators to qubits for projecting onto specific basis states
    - Comprehend the mathematical framework and implications of using projection operators
    - Understand the relationship between projection operators and the identity operator
      in quantum mechanics
    - Grasp the concept that projecting a state twice yields the same result as projecting
      it once
    - Learn that repeated measurements in the same basis produce consistent results
    - Calculate the projection of a specific qubit onto the standard basis using projection
      operators
    - Demonstrate the application of projection operators to determine the outcome
      probabilities for a given qubit state
    - Apply knowledge of quantum mechanics and linear algebra to solve practical problems
    - Apply projection operators to a given qubit to compute outcomes in the standard
      basis
    - Calculate the probabilities of the qubit collapsing to each basis state upon
      measurement
    - Demonstrate the mathematical process of determining a quantum state's measurement
      outcomes
    estimated_time_mins: 5
    concepts:
    - Projection
    - Projection Operators
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-13-03
    summary: Students will be able to compute the projection operators for a basis.
    covered_by:
    - m13-QuantumMeasurementPostulate
    - m13-ComputationalBasisMeasurement
    - m13-PostMeasurementStates
    - m13-quiz-13.1
    learning_objectives:
    - Understand the quantum measurement postulate and its implications on the measurement
      process
    - Calculate the probability of different measurement outcomes and the post-measurement
      state of a quantum system
    - Recognize the condition under which the measurement postulate simplifies to
      projective measurement
    - Identify the projection operators as measurement operators for the computational
      or standard basis
    - Understand the properties of Hermitian operators in the context of quantum measurements
    - Calculate the probabilities of obtaining specific measurement outcomes for a
      given quantum state
    - Calculate the post-measurement state of a quantum system for given outcomes
    - Understand the role of global phase in the post-measurement state and its non-effect
      on the state
    - Relate the post-measurement states to the computational basis states, acknowledging
      the insignificance of global phase
    - Identify measurement operators for given basis sets
    - Calculate the probability of collapse for specific qubits with respect to these
      operators
    - Determine the final state of a qubit after measurement based on calculated probabilities
    estimated_time_mins: 8
    concepts:
    - Quantum Measurement Postulate
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-13-04
    summary: Students will be able to calculate the probabilities of outcomes for
      a given basis using projection operator and determine the final state of the
      qubit.
    covered_by: []
    learning_objectives: []
    estimated_time_mins: 0
    concepts: []
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-13-05
    summary: Students will understand the density matrix formulation and will be able
      to apply it for projective measurements.
    covered_by:
    - m13-DensityMatrices
    - m13-DensityMatricesMeasurementExample
    - m13-DensityMatricesExpansion
    - m13-quiz-13.2
    learning_objectives:
    - Introduce the concept of density matrices as an alternative representation of
      quantum states
    - Explain the necessity of density matrices for describing mixed states and their
      probabilistic nature
    - Understand the application of density matrices in representing individual qubits
      within entangled systems
    - Derive density matrices for specific quantum states
    - Understand how to represent mixed states with density matrices
    - Calculate the probabilities of measurement outcomes for quantum states represented
      by density matrices
    - Perform detailed expansions for calculating probabilities using density matrices
    - Apply linear algebra techniques to density matrices for outcome probability
      calculations
    - Interpret the mathematical results of density matrix expansions in the context
      of quantum measurements
    - Compute density matrices for quantum systems based on the probability of qubit
      preparations
    - Calculate outcome probabilities for given quantum system states using the density
      matrix approach
    - Apply quantum mechanics principles to analyze and solve problems involving mixed
      state preparations and measurements
    estimated_time_mins: 8
    concepts:
    - Density Matrices
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
