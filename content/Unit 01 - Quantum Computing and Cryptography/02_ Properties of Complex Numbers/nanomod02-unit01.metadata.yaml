learning_objective_tree:
  title: Properties of Complex Numbers
  global_prerequisites:
  - Algebra
  - Introduction to Programming
  - Python Basics
  objectives:
  - lo_id: LO-02-01
    summary: Students will be able to represent complex numbers as ordered pairs.
    covered_by:
    - m2-background
    learning_objectives:
    - Develop intuition for complex numbers through geometric representation
    - Represent complex numbers as ordered pairs
    - Perform addition and multiplication on complex numbers represented as ordered
      pairs
    estimated_time_mins: 2
    concepts:
    - Properties of Complex Numbers
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-02-02
    summary: Students will know some of the basic properties of complex numbers and
      operations on them.
    covered_by:
    - m2-background
    - m2-properties
    - m2-propertiesContd
    - m2-quiz-2.1
    - m2-quiz-2.1-interactive
    learning_objectives:
    - Develop intuition for complex numbers through geometric representation
    - Represent complex numbers as ordered pairs
    - Perform addition and multiplication on complex numbers represented as ordered
      pairs
    - Understand the commutative and associative properties of addition and multiplication
      with complex numbers
    - Understand the distributive property of multiplication over addition with complex
      numbers
    - Apply negation to complex numbers
    - Perform subtraction of complex numbers
    - Understand and perform division of complex numbers
    - Compute the product of complex numbers in cartesian representation
    - Numerically verify the distributive property of multiplication over addition
      with complex numbers
    - Compute division of complex numbers in cartesian representation
    - Compute the product of complex numbers in cartesian representation
    - Numerically verify the distributive property of multiplication over addition
      with complex numbers
    - Compute division of complex numbers in cartesian representation
    estimated_time_mins: 26
    concepts:
    - Properties of Complex Numbers
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-02-03
    summary: Students will be able to compute the modulus and conjugate of complex
      numbers.
    covered_by:
    - m2-modulusConjugation
    - m2-quiz-2.2
    - m2-quiz-2.2-interactive
    learning_objectives:
    - Understand the concept of modulus of a complex number
    - Compute the modulus of complex numbers
    - Understand the concept of conjugate of a complex number
    - Compute the conjugate of complex numbers
    - Compute the modulus of given complex numbers
    - Compute the conjugate of given complex numbers
    - Compute the modulus of given complex numbers
    - Compute the conjugate of given complex numbers
    estimated_time_mins: 18
    concepts:
    - Modulus and Conjugation
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-02-04
    summary: Students will be able to prove basic properties of modulus and conjugate
      operations.
    covered_by:
    - m2-modulusConjugation
    - m2-quiz-2.2
    - m2-quiz-2.2-interactive
    learning_objectives:
    - Understand the concept of modulus of a complex number
    - Compute the modulus of complex numbers
    - Understand the concept of conjugate of a complex number
    - Compute the conjugate of complex numbers
    - Compute the modulus of given complex numbers
    - Compute the conjugate of given complex numbers
    - Compute the modulus of given complex numbers
    - Compute the conjugate of given complex numbers
    estimated_time_mins: 18
    concepts:
    - Modulus and Conjugation
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-02-05
    summary: Students will be able to implement programs to divide two complex numbers,
      compute the modulus and conjugate.
    covered_by:
    - m2-final-quiz
    learning_objectives: []
    estimated_time_mins: 0
    concepts: []
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
