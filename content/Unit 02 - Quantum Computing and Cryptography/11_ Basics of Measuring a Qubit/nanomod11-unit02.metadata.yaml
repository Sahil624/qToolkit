learning_objective_tree:
  title: Basics of Measuring a Qubit
  global_prerequisites:
  - Linear Algebra
  - Complex Numbers
  - Introduction to Quantum Mechanics
  objectives:
  - lo_id: LO-11-01
    summary: Students will understand the basics of measuring a qubit.
    covered_by:
    - m11-MeasuringAQubit
    learning_objectives:
    - Understand the process and implications of measuring a single qubit
    - Grasp the concept of orthonormal basis in the context of quantum measurement
    - Learn how the measurement process changes the state of a quantum system
    - Recognize the limitations of information extraction from a quantum state due
      to measurement
    estimated_time_mins: 7
    concepts:
    - Loss of Information
    - Measurement Basis
    - Orthonormal Basis
    - Probabilities of Collapse
    - Quantum State Collapse
    - Single-Qubit Measurement
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-11-02
    summary: Students will be able to compute the probabilities of outcomes upon measurement.
    covered_by:
    - m11-MeasuringAQubit
    learning_objectives:
    - Understand the process and implications of measuring a single qubit
    - Grasp the concept of orthonormal basis in the context of quantum measurement
    - Learn how the measurement process changes the state of a quantum system
    - Recognize the limitations of information extraction from a quantum state due
      to measurement
    estimated_time_mins: 7
    concepts:
    - Loss of Information
    - Measurement Basis
    - Orthonormal Basis
    - Probabilities of Collapse
    - Quantum State Collapse
    - Single-Qubit Measurement
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-11-03
    summary: Student will be able to compute transition amplitudes from one state
      to the other.
    covered_by:
    - m11-TransitionAmplitudes
    - m11-ComplexQubitTransition
    - m11-GeneralTransitionAmplitudes
    - m11-ExampleTransitionAmplitude
    learning_objectives:
    - Understand how to compute transition amplitudes for quantum states
    - Learn the process of determining probabilities of state collapse through inner
      products
    - Grasp the concept of state transition in quantum mechanics and how it's quantified
    - Calculate transition amplitudes for complex qubit states
    - Understand the application of the dagger operation in computing inner products
      for complex vectors
    - Determine probabilities of quantum state collapse to specific states
    - Calculate the probability amplitude of transitioning from one quantum state
      to another
    - Understand the significance of orthogonal states in quantum mechanics
    - Learn the importance of using an orthonormal basis in quantum measurements
    - Demonstrate how to calculate the probability amplitude of a qubit collapsing
      to a specific state
    - Apply the concept of orthonormal basis to represent qubits and compute transition
      probabilities
    - Understand the procedure for computing inner products using bra-ket notation
    estimated_time_mins: 7
    concepts:
    - Transition Amplitudes
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-11-04
    summary: Student will understand the notion of global and local phase and their
      interpretations.
    covered_by:
    - m11-GlobalAndRelativePhases
    - m11-Quiz-11.1
    learning_objectives:
    - Understand the concept of global phase and its lack of physical significance
    - Learn about relative phase and its impact on the uniqueness of quantum states
    - Differentiate between qubits that are equivalent and those that are distinct
      due to relative phases
    - Calculate measurement outcomes and transition amplitudes for given qubits in
      different bases
    - Apply the inner product to compute transition amplitudes accurately
    - Distinguish between equivalent and distinct quantum states based on global and
      relative phases
    estimated_time_mins: 9
    concepts:
    - Global Phase and Relative Phase
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
