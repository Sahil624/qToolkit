  - id: Q017
    question: In the E91 protocol, what is the specific purpose of the measurements made in different bases?
    relevant_lo_ids: ["LO-22-05"]
    reference_answer: |
      In the E91 protocol, the qubits measured in *different* bases are used to detect any eavesdropper (or decoherence). This is done by checking if the results violate Bell's inequality (specifically the CHSH game). [cite_start]If they satisfy the inequality, it indicates the qubits are independent (not entangled)[cite: 5], implying the presence of an eavesdropper.
