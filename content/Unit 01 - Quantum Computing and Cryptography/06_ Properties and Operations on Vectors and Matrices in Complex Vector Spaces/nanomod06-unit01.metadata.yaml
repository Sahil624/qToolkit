learning_objective_tree:
  title:
  - Properties and Operations on Vectors and Matrices in Complex Vector Spaces
  global_prerequisites:
  - Linear Algebra
  - Complex Numbers
  - Introduction to Programming
  - Python Basics
  - Complex Vector Spaces
  objectives:
  - lo_id: LO-06-01
    summary: Students will understand the definition and properties of inner product
      of vectors and matrices.
    covered_by:
    - m6-InnerProduct
    - m6-PropertiesInnerProduct
    - m6-ExamplesInnerProduct
    learning_objectives:
    - Understand the definition of inner product for complex vector spaces
    - Distinguish the inner product calculation for vectors and matrices
    - Understand and apply the properties of inner product in complex vector spaces
    - Calculate the inner product for given vector and matrix examples
    estimated_time_mins: 11
    concepts:
    - Inner Product and Properties
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-06-02
    summary: Students will be able to compute the inner product.
    covered_by:
    - m6-Quiz-6.1
    - m6-Quiz-6.1-interactive
    learning_objectives:
    - Compute the inner product for given vectors and matrices
    - Prove specific properties of the inner product
    - Compute the inner product for given vectors and matrices
    - Prove specific properties of the inner product
    estimated_time_mins: 25
    concepts:
    - Inner Product and Properties
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-06-03
    summary: Students will be able to compute the norm of a vector.
    covered_by:
    - m6-NormVector
    - m6-Quiz-6.2
    - m6-Quiz-6.2-interactive
    learning_objectives:
    - Understand and compute the norm of a vector using the inner product
    - Apply the concept of norm to determine the length of vectors in complex vector
      spaces
    - Numerically verify the norm properties for given vectors
    - Apply the concepts of vector addition and scalar multiplication to verify norm
      properties
    - Numerically verify the norm properties for given vectors
    - Apply the concepts of vector addition and scalar multiplication to verify norm
      properties
    estimated_time_mins: 28
    concepts:
    - Norm of a Vector
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-06-04
    summary: Students will understand and apply the concept of orthogonal/orthonormal
      vectors and basis.
    covered_by:
    - m6-OrthogonalVectors
    - m6-OrthogonalBasis
    learning_objectives:
    - Understand the concept of orthogonal vectors and their characteristics
    - Identify orthogonal vectors through inner product calculations
    - Understand the concept of orthogonal and orthonormal basis in complex vector
      spaces
    - Identify basis sets that are orthogonal and/or orthonormal
    estimated_time_mins: 6
    concepts:
    - Orthogonal Vectors
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-06-05
    summary: Students will be able to represent a vector using a given basis set.
    covered_by:
    - m6-OrthogonalBasis
    learning_objectives:
    - Understand the concept of orthogonal and orthonormal basis in complex vector
      spaces
    - Identify basis sets that are orthogonal and/or orthonormal
    estimated_time_mins: 3
    concepts:
    - Orthogonal Vectors
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-06-06
    summary: Students will understand and apply the projection of one vector onto
      another vector.
    covered_by:
    - m6-Projection
    learning_objectives:
    - Understand the concept of projection in the context of inner product and vector
      spaces
    - Apply the inner product to calculate the projection of one vector onto another
    estimated_time_mins: 3
    concepts:
    - Orthogonal Vectors
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-06-07
    summary: Student will synthesize concepts to write Python programs to determine
      the norm and inner product of vectors and matrices.
    covered_by:
    - m6-final-quiz
    learning_objectives: []
    estimated_time_mins: 0
    concepts: []
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
