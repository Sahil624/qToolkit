learning_objective_tree:
  title: Basics of Quantum Computing/Cryptography
  global_prerequisites:
  - Linear Algebra
  - Complex Numbers
  - Introduction to Quantum Mechanics
  objectives:
  - lo_id: LO-10-01
    summary: Students will be able to model two level quantum systems using vector
      and ket representations.
    covered_by:
    - m10-ClassicalBits
    - m10-Qubits
    - m10-KetNotation
    learning_objectives:
    - Understand the concept of classical bits as a two-dimensional system
    - Learn different physical representations of bits
    - Grasp how to represent the knowledge of a system's state using probability vectors.
    - Understand the transition from classical bits to qubits in quantum computing
    - Learn the representation of quantum states with complex numbers
    - Grasp the concept of probability amplitudes and their significance in quantum
      state representation
    - Learn Dirac's (ket) notation for representing quantum states
    - Understand the concept of superposition as a fundamental difference between
      quantum and classical systems
    - Appreciate the simplicity and generality of ket notation in expressing quantum
      states
    estimated_time_mins: 7
    concepts:
    - Classical Bits
    - Ket Notation
    - Qubits
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-10-02
    summary: Students will understand the notions qubit, amplitude and probability
      of collapse.
    covered_by:
    - m10-QubitsAndMeasurement
    - m10-LinearCombinationAndExample
    - m10-quiz-10.1
    - m10-quiz-10.1-interactive
    learning_objectives:
    - Understand the process and consequences of measuring a quantum state
    - Learn how quantum states collapse to classical states upon measurement
    - Grasp the limitations of information extraction from a quantum state due to
      the nature of measurement
    - Understand how qubits can be represented as linear combinations of basis states
    - Learn the concept of canonical basis in the context of quantum computing
    - Grasp how to calculate the probability of a qubit collapsing to a specific state
      upon measurement
    - Identify valid qubit representations from a list of examples
    - Practice normalizing coefficients to convert invalid expressions into valid
      qubits
    - Identify valid qubit representations from a list of examples
    - Practice normalizing coefficients to convert invalid expressions into valid
      qubits
    estimated_time_mins: 14
    concepts:
    - Linear Combination
    - Qubits and Measurement
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-10-03
    summary: Students will understand the notion of superposition.
    covered_by:
    - m10-Superposition
    learning_objectives:
    - Understand the concept of superposition as a fundamental aspect of quantum systems
    - Differentiate between quantum superposition and classical probabilistic states
    - Grasp the implications of quantum measurement on superposed states
    estimated_time_mins: 3
    concepts:
    - Superposition
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-10-04
    summary: Students will be able to change between basis representations for a given
      qubit.
    covered_by:
    - m10-Basis
    - m10-spaceExplorerGame
    - m10-spaceExplorerGameCode
    learning_objectives:
    - Understand the concept of basis in the context of vector spaces and quantum
      mechanics
    - Learn how to represent vectors as linear combinations of basis vectors
    - Grasp the importance of orthonormality and how to determine if vectors are orthogonal
      or orthonormal
    - Familiarize with Dirac's bra-ket notation for expressing inner products
    estimated_time_mins: 1
    concepts:
    - Basis
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-10-05
    summary: Students will be able to determine if it is a Superposition or Not Superposition
    covered_by:
    - m10-SuperpositionOrNotSuperposition
    - m10-quiz-10.2
    - m10-quiz-10.2-interactive
    learning_objectives:
    - Understand the dependency of superposition on the choice of basis
    - Learn how the standard basis and Hadamard basis provide different perspectives
      on superposition
    - Grasp the concept of changing bases and its effect on the interpretation of
      quantum states
    - Identify which qubits are in superposition with respect to the standard basis
    - Propose an alternative basis where these qubits are not considered to be in
      superposition
    - Identify which qubits are in superposition with respect to the standard basis
    - Propose an alternative basis where these qubits are not considered to be in
      superposition
    estimated_time_mins: 16
    concepts:
    - Superposition
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
