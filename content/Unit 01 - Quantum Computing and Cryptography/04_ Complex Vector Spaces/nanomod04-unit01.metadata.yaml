learning_objective_tree:
  title:
  - Complex Vector Spaces
  global_prerequisites:
  - Linear Algebra
  - Complex Numbers
  - Introduction to Programming
  - Python Basics
  objectives:
  - lo_id: LO-04-01
    summary: Students will understand the concept and definition of Complex Vector
      Spaces.
    covered_by:
    - m4-Background
    learning_objectives:
    - Understand the concept of complex vector spaces
    - Identify examples of complex vectors in different dimensions
    estimated_time_mins: 2
    concepts:
    - Complex Vector Spaces
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-04-02
    summary: Students will be able to perform basic operation in Complex Vector Spaces.
    covered_by:
    - m4-OperationsComplexVectors
    - m4-OperationsScalar
    learning_objectives:
    - Understand and perform addition of complex vectors
    - Apply commutative and associative properties in vector addition
    - Understand and perform addition of complex vectors as a scalar
    estimated_time_mins: 6
    concepts:
    - Operations with Complex Vector Spaces
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-04-03
    summary: Students will prove properties of Complex Vector Spaces and operations.
    covered_by:
    - m4-quiz-4.1
    - m4-quiz-4.1-interactive
    - m4-ComplexVectorSpaces
    - m4-MatricesComplexVectorSpaces
    - m4-PropertiesTransposeConjugateDagger
    - m4-quiz-4.2
    - m4-quiz-4.2-interactive
    learning_objectives:
    - Compute addition and subtraction of complex vectors
    - Perform scalar multiplication on complex vectors
    - Verify properties of complex vector spaces numerically
    - Compute addition and subtraction of complex vectors
    - Perform scalar multiplication on complex vectors
    - Verify properties of complex vector spaces numerically
    - Understand the definition of complex vector spaces
    - Identify operations and properties in complex vector spaces
    - Understand matrices as complex vector spaces
    - 'Identify and perform additional operations for matrices: transpose, conjugate,
      and dagger'
    - Understand the properties of transpose, conjugate, and dagger operations
    - Apply properties of these operations to complex matrices
    - Numerically verify the properties of transpose, conjugate, and dagger operations
      for complex matrices
    - Numerically verify the properties of transpose, conjugate, and dagger operations
      for complex matrices
    estimated_time_mins: 66
    concepts:
    - Matrices and Complex Vector Spaces
    - Operations with Complex Vector Spaces
    - Properties of Transpose, Conjugate and Dagger Operations
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-04-04
    summary: Students will be able to perform matrix operations and understand and
      use their properties.
    covered_by:
    - m4-MatrixMultiplication
    - m4-IdentityMatrix
    - m4-PropertiesMatrixMultiplication
    - m4-quiz-4.3
    - m4-quiz-4.3-interactive
    learning_objectives:
    - Understand and perform matrix multiplication in complex vector spaces
    - Recognize the non-commutative nature of matrix multiplication
    - Understand the role of the identity matrix in matrix multiplication
    - Identify the identity matrix and its properties within complex vector spaces
    - Understand and apply the properties of matrix multiplication within complex
      vector spaces
    - Numerically verify the properties of matrix multiplication within complex vector
      spaces
    - Numerically verify the properties of matrix multiplication within complex vector
      spaces
    estimated_time_mins: 60
    concepts:
    - Matrix Multiplication and Properties
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-04-05
    summary: Student will be able to implement programs that performs addition, multiplication,
      transpose, conjugate and dagger operations on vectors and matrices.
    covered_by:
    - m4-final-quiz
    learning_objectives: []
    estimated_time_mins: 0
    concepts: []
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
