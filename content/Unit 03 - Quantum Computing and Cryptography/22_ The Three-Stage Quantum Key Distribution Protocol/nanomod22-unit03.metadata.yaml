cell_metadata:
- cell_id: m22-LearningOutcomes
  title: 22. The Three-Stage Quantum Key Distribution Protocol & Entanglement based
    QKD
  type: markdown
  estimated_time: '1'
  prerequisites: []
  concepts:
  - Learning Outcomes
  outcomes: []
  extra_props:
    slideshow:
      slide_type: slide
    cell_alternates: []
    cell_interactive: 'false'
    cell_title: Learning Outcomes
    module_outcomes:
    - Students will understand the concept of double lock cryptography.
    - Students will know the working of three-stage quantum key distribution protocol.
    - Students will be able to apply the concepts of orthogonality of basis, measurement
      and indistinguishability of non-orthogonal states.
    - Students will apply the principle of quantum entanglement and Bell's inequality
      to construct a quantum key distribution protocol.
    - Students will be able to use Bell's inequality to check for eavesdropping.
    module_prereqs:
    - Linear Algebra
    - Complex Numbers
    - Introduction to Programming
    - Python Basics
    - Complex Vector Spaces
    module_title:
    - The Three-Stage Quantum Key Distribution Protocol & Entanglement based QKD
