learning_objective_tree:
  title: Multi-Qubit Gates and Operations
  global_prerequisites:
  - Linear Algebra
  - Quantum Mechanics Fundamentals
  - Single-Qubit Operations
  objectives:
  - lo_id: LO-18-01
    summary: Students will be able to construct multi-qubit gates from single qubit
      gates.
    covered_by:
    - m18-ComposingSingleQubitOperations
    - m18-JointGateRepresentation
    - m18-JointGateRepresentationConclusion
    - m18-GateOperationOnJointQubits
    learning_objectives:
    - Learn how to compose multi-qubit operations from single qubit gates
    - Understand the use of tensor products in creating complex quantum gates
    - Apply knowledge of single qubit gates to construct operations on multi-qubit
      systems
    - Determine the joint gate representation for parallel operations on multi-qubit
      systems
    - Understand how individual gate operations combine to form the overall transformation
      on joint states
    - Visualize and analyze the circuit representation of parallel gate applications
      on multi-qubit systems
    - Understand the final representation of the joint gate through the tensor product
      of individual gates
    - Learn the mathematical formulation for combining gate operations on multi-qubit
      systems
    - Grasp the implications of joint gate operations for quantum computing and system
      transformations
    - Calculate the action of a two-qubit gate on the joint representation of qubits
    - Verify the consistency of gate operations on joint states with individual qubit
      transformations
    - Understand the process of quantum state transformation in multi-qubit systems
      through gate operations
    estimated_time_mins: 4
    concepts:
    - Single Qubit to Mutii Qubit Operations
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-18-02
    summary: Students will understand the operations of new multi-qubit gates.
    covered_by:
    - m18-TrueMultiQubitGates
    - m18-TheCNOTGate
    - m18-CNOTGateExample
    - m18-CNOTGateXOR
    learning_objectives:
    - Understand the concept of true multi-qubit gates that act on multiple qubits
      simultaneously
    - Learn the matrix representation and effects of specific multi-qubit gates such
      as CNOT, Toffoli, and Fredkin
    - Appreciate the utility of true multi-qubit gates in performing operations beyond
      the capability of single qubit gates
    - Understand the structure and function of the CNOT gate in quantum computing
    - Learn how the CNOT gate can be used to entangle and disentangle qubits
    - Identify the roles of control and target qubits in the operation of the CNOT
      gate
    - Illustrate the conditional operation of the CNOT gate based on the state of
      the control qubit
    - Understand the resulting state of the target qubit after the CNOT gate operation
    - Grasp the concept of entanglement as a result of conditional quantum gate operations
    - Understand the operation of the CNOT gate in the context of the XOR logical
      function
    - Grasp the basis dependency of the CNOT gate's 'unchangeability' of the control
      qubit
    - Appreciate the nuances of applying classical logic notation to quantum operations
    estimated_time_mins: 4
    concepts:
    - CNOT Gate
    - True Multi-Qubit Gates
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-18-03
    summary: Students will be able to compute outputs of circuits consisting of multiple
      qubits.
    covered_by:
    - m18-CNOTUnitaryInverse
    - m18-CNOTBasisDependency
    - m18-CNOTForEntanglement
    - m18-GeneralControlledOperation
    - m18-CNOTForSwap
    - m18-OtherMultiQubitGates
    - m18-UniversalGateSet
    learning_objectives:
    - Recognize the CNOT gate as a unitary transformation
    - Understand that the CNOT gate is its own inverse, allowing for reversible computing
    - Appreciate the significance of unitary transformations in quantum computing
      for ensuring reversibility
    - Explore the basis dependency of the CNOT gate's operation within quantum circuits
    - Challenge the assumption of reversibility in specific circuit configurations
      involving the CNOT and Hadamard gates
    - Encourage the computation of circuit outputs for various qubit states to understand
      the nuanced behavior of quantum gates
    - Understand how the CNOT gate can be used to entangle qubits when the control
      qubit is in superposition
    - Learn the specific circuit configuration used to create Bell pairs with the
      CNOT gate
    - Appreciate the role of input states in determining the outcome of entanglement
      processes
    - Understand the concept and representation of general controlled operations in
      quantum computing
    - Learn the matrix representation of a controlled operation involving an arbitrary
      quantum gate
    - Grasp the significance of controlled operations in constructing complex quantum
      algorithms
    - Preview the use of the CNOT gate in quantum teleportation
    - Introduce a swap circuit constructed with CNOT gates
    - Foreshadow the application of these concepts on a practical quantum computing
      platform
    - Understand the structure and function of the Toffoli and Fredkin gates in quantum
      computing
    - Learn the operational dynamics of these gates, including the requirement for
      control bits to be on
    - Grasp the application of complex multi-qubit operations in constructing quantum
      algorithms
    - Understand the concept of a universal gate set in both classical and quantum
      circuits
    - Learn which operations comprise a quantum universal gate set
    - Appreciate the equivalency of certain gate sets in achieving universal computation
      in quantum computing
    estimated_time_mins: 7
    concepts:
    - CNOT Gate
    - General Controlled Operation
    - Other Multi Qubit Gates
    - Universal Gate Set
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
