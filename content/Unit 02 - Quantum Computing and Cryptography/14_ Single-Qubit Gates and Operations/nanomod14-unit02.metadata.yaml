learning_objective_tree:
  title: Single-Qubit Gates and Operations
  global_prerequisites:
  - Linear Algebra
  - Quantum Mechanics Fundamentals
  - Complex Numbers
  objectives:
  - lo_id: LO-14-01
    summary: Students will understand and will be able to apply common single-qubit
      operations (gates).
    covered_by:
    - m14-TransformationsOnQubits
    - m14-SingleQubitTransformations
    - m14-PauliMatrices
    - m14-quiz-14.1
    learning_objectives:
    - Understand how basic operations on qubits can be represented using unitary matrices
    - Grasp the concept of a unitary operator mapping input quantum states to output
      quantum states
    - Learn the significance of inner product preservation in unitary transformations
    - Understand and apply the Hadamard transform for single qubit transformations
    - Grasp the concept and application of the rotation operator in qubit transformations
    - Verify the unitary property of rotation operators and analyze their effects
      on quantum states
    - Understand the role and characteristics of Pauli matrices in quantum mechanics
    - Learn the effects of Pauli matrices as single qubit operations, including bit-flip
      and phase-flip
    - Analyze the behavior of Pauli matrices in different bases and their properties
      as Hermitian operators
    - Prove the unitarity of Pauli gates
    - Verify the properties of phase shift gates and the square-root of NOT gate
    - Enhance understanding of fundamental quantum gates and their mathematical proofs
    estimated_time_mins: 5
    concepts:
    - Pauli Matrices
    - Qubit Transformations
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-14-02
    summary: Students will be able to build sequential quantum circuits for single
      qubits.
    covered_by:
    - m14-BuildingCircuits
    learning_objectives:
    - Understand the basic structure and flow of quantum circuits
    - Learn how to represent sequential single-qubit operations in circuit form
    - Grasp the convention of writing linear expressions for quantum circuits and
      their operations
    estimated_time_mins: 1
    concepts:
    - Building Quantum Circuits
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-14-03
    summary: Students will be able to compute the effect of given sequential quantum
      circuit on a qubit.
    covered_by:
    - m14-ComputingCircuitOperation
    - m14-quiz-14.2
    learning_objectives:
    - Compute the overall effect of a quantum circuit on a qubit
    - Apply the rule of operator multiplication to determine the output state of a
      qubit after circuit operations
    - Understand the process of transforming a qubit through sequential gate operations
      in a quantum circuit
    - Compute the effect of specified quantum circuits on given qubits
    - Analyze the transformation of qubits through sequential application of quantum
      gates
    - Develop observations based on the outcomes of circuit operations on qubits
    estimated_time_mins: 3
    concepts:
    - Building Quantum Circuits
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
