learning_objective_tree:
  title: Multi-qubit Systems
  global_prerequisites:
  - Linear Algebra
  - Quantum Mechanics Fundamentals
  - Single-Qubit Operations
  objectives:
  - lo_id: LO-15-01
    summary: Students will represent the state of a multi-qubit system.
    covered_by:
    - m15-MultiQubitSystems
    - m15-ExponentialGrowthInStateSpace
    - m15-RepresentingAQubyte
    - m15-TensorProductOfVectorSpacesRecap
    - m15-OrthogonalBasis
    - m15-Decomposability
    learning_objectives:
    - Understand the necessity and functionality of multi-qubit systems in quantum
      computing
    - Learn about the concepts of entangled qubits and their applications in quantum
      cryptography and teleportation
    - Appreciate the complexity and potential of multi-qubit operations, including
      gates that operate on multiple qubits
    - Understand the exponential growth in the state space of quantum systems with
      increasing qubits
    - Compare and contrast the state space of classical and quantum systems
    - Learn about entanglement as a fundamental quantum phenomenon with no classical
      counterpart
    - Learn how to represent the state of a quantum register holding eight qubits,
      or a qubyte
    - Understand the process and significance of taking the tensor product of individual
      qubit states
    - Appreciate the resulting vector space dimensionality from combining qubits through
      tensor products
    - Recap the concept of tensor product of vector spaces and its significance in
      quantum mechanics
    - Understand how to construct the basis set for the tensor product of two vector
      spaces
    - Appreciate the notation and properties of tensor products in the context of
      quantum computing
    - Understand the orthonormal property of basis sets resulting from the tensor
      product of orthonormal bases
    - Learn the dimensional properties of tensor products involving vector spaces
    - Grasp the implications of tensor product dimensions on the complexity of quantum
      systems
    - Understand the concept of decomposability in the context of tensor products
      of vector spaces
    - Recognize that not all elements in a tensor product space can be decomposed
      into simpler tensor products
    - Grasp the implications of this limitation for analyzing and representing quantum
      states
    estimated_time_mins: 8
    concepts:
    - Exponential Growth in State Space
    - Multi-Qubit Systems
    - Orthogonal Basis
    - Tensor Product
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-15-02
    summary: Students will be able to construct the basis for a multi-qubit system.
    covered_by:
    - m15-StateSpaceOfANQubitSystem
    - m15-WhichQubitBelongsToWhom
    - m15-VectorNotationForJointState
    - m15-JointStateVectorForm
    - m15-GlobalPhaseMultiQubit
    - m15-quiz-15.1
    learning_objectives:
    - Understand the representation of the state space for a joint n-qubit system
    - Learn how to construct the basis for an n-qubit system in standard vector spaces
    - Grasp the shorthand notation for representing joint quantum states
    - Understand how to represent joint quantum systems with qubits controlled by
      different entities
    - Learn the notation and methods for keeping track of qubit ownership in multi-qubit
      systems
    - Grasp the concept of representing complex quantum systems involving multiple
      controllers
    - Understand the challenges of using vector notation to represent joint states
      in multi-qubit systems
    - Learn the importance of establishing a well-defined order for qubits in joint
      state representation
    - Grasp the method of representing joint states without ambiguity in the absence
      of subscripts or grouping in vector notation
    - Express the joint state of multiple qubits in vector form, using the standard
      basis for representation
    - Understand the construction and significance of the standard basis vectors in
      representing joint quantum states
    - Learn the methodological approach to structuring and interpreting vector representations
      of quantum systems
    - Understand the concept of global phase in the context of joint quantum states
    - Recognize that quantum states differing only in a global phase represent the
      same physical state
    - Apply the principle of global phase equivalence to multi-qubit systems
    - Represent given qubits in joint state using both Ket and vector notations
    - Translate specified quantum states into the Bell basis representation
    - Apply knowledge of quantum state notation and transformation in practical exercises
    estimated_time_mins: 7
    concepts:
    - Global Phase
    - State Space of n-qubit System
    - Which Qubits belongs to whom
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
