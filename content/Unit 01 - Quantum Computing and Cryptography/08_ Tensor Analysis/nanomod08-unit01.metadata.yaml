learning_objective_tree:
  title:
  - Overview of Tensor Analysis
  global_prerequisites:
  - Linear Algebra
  - Complex Numbers
  - Introduction to Programming
  - Python Basics
  objectives:
  - lo_id: LO-08-01
    summary: Students will understand the definition of Tensor Product and the joint
      Basis for two systems.
    covered_by:
    - m8-TensorProduct
    - m8-JointBasis
    - m8-ExampleTensorProduct
    learning_objectives:
    - Understand the use of tensor products in describing joint states of quantum
      systems
    - Identify the components and structure of a tensor product
    - Learn the properties of tensor products, including distribution over addition
      and respect for scalar multiplication
    - Understand the concept of a joint basis for tensor product spaces
    - Determine the basis for the tensor product of two vector spaces
    - Comprehend how the dimension of the tensor product space is calculated
    - Demonstrate the calculation of tensor products through examples
    - Apply the concept of tensor products to vectors
    - Visualize the structure of a tensor product of two vectors
    estimated_time_mins: 8
    concepts:
    - Tensor Product
    - Tensor Products
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-08-02
    summary: Students will be able to perform tensor of matrices and vectors.
    covered_by:
    - m8-Quiz-8.1
    learning_objectives:
    - Calculate tensor products involving both real and complex vectors
    - Apply knowledge of vector operations to solve tensor product problems
    - Self-assess understanding of tensor products and their properties
    estimated_time_mins: 10
    concepts:
    - Tensor Product
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-08-03
    summary: Students will understand the Inseperability of quantum systems in context
      of tensor products.
    covered_by:
    - m8-Entanglement
    learning_objectives:
    - Understand the concept of entanglement in the context of tensor products
    - Identify systems that cannot be decomposed into tensor products of smaller vectors
    - Recognize the implications of entanglement for quantum systems
    estimated_time_mins: 1
    concepts:
    - Tensor Products
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-08-04
    summary: Students will understand computing tensor products.
    covered_by:
    - m8-TensorProductMatrices
    - m8-ExamplesTensorProductMatrices
    learning_objectives:
    - Extend the concept of tensor products to matrices
    - Construct operators for joint system states using tensor products
    - Understand how to perform tensor product operations on matrices
    - Demonstrate the calculation of tensor products of matrices including complex
      numbers
    - Visualize the process of scalar multiplying a matrix by each element of another
      matrix in the context of tensor products
    - Apply the concept of tensor products to complex matrices
    estimated_time_mins: 7
    concepts:
    - Tensor Product Matrices
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-08-05
    summary: Students will learn the properties of Tensor Product of Matrices.
    covered_by:
    - m8-PropertiesTensorProductMatrices
    learning_objectives:
    - Understand and apply the associativity property of tensor products of matrices
    - Learn how the tensor product respects the adjoint operation
    - Identify key properties of tensor products in the context of matrix operations
    estimated_time_mins: 1
    concepts:
    - Tensor Product Matrices
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-08-06
    summary: Students will implement a program that computes the Tensor product of
      two matrices.
    covered_by:
    - m8-final-quiz
    learning_objectives: []
    estimated_time_mins: 0
    concepts: []
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
