learning_objective_tree:
  title:
  - 'Complex Vector Spaces: Linear Combination, Independence, Basis and Dimensions'
  global_prerequisites:
  - Linear Algebra
  - Complex Numbers
  - Introduction to Programming
  - Python Basics
  - Complex Vector Spaces
  objectives:
  - lo_id: LO-05-01
    summary: Students will understand and apply the concept of linear independence.
    covered_by:
    - m5-LinearDependenceIndependence
    - m5-ExamplesLinearDependenceIndependence
    - m5-Quiz-5.1
    - m5-Quiz-5.1-interactive
    learning_objectives:
    - Understand the concepts of linear combination and linear independence in complex
      vector spaces
    - Apply these concepts to analyze the structure of complex vector spaces
    - Identify examples of linearly dependent and independent sets of vectors
    - Apply criteria to determine linear dependence and independence
    - Show that a given set of vectors is not linearly independent
    - Apply the concept of linear independence to specific examples
    - Show that a given set of vectors is not linearly independent
    - Apply the concept of linear independence to specific examples
    estimated_time_mins: 46
    concepts:
    - Linear Dependence and Independence
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-05-02
    summary: Students will understand and apply the concept of basis and dimension
      of a complex vector space.
    covered_by:
    - m5-Basis
    - m5-Dimension
    - m5-Quiz-5.2
    - m5-Quiz-5.2-interactive
    learning_objectives:
    - Understand the concept of a basis in complex vector spaces
    - Identify examples of basis sets, including orthonormal bases
    - Understand the concept of the dimension of a complex vector space
    - Relate the dimension to the number of vectors in a basis set
    - "Verify that given sets are basis for \u21022"
    - "Verify that given sets are basis for \u21022"
    estimated_time_mins: 13
    concepts:
    - Basis and Dimension
    - Basis and Dimensions
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-05-03
    summary: Students will understand and the apply the concept of transisition Matrices.
    covered_by:
    - m5-TransitionMatrices
    - m5-Quiz-5.3
    - m5-Quiz-5.3-interactive
    learning_objectives:
    - Understand the concept of transition matrices and their application in changing
      basis of vectors
    - Identify the role of Hadamard matrix in quantum computing for basis conversion
    - Represent vectors in the Hadamard basis
    - Prove that the Hadamard matrix is its own inverse
    - Represent vectors in the Hadamard basis
    - Prove that the Hadamard matrix is its own inverse
    estimated_time_mins: 55
    concepts:
    - Transition Matrices
    prerequisites: []
