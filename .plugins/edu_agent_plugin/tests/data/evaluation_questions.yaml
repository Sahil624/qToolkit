  - id: Q018
    question: According to the notes, what is the fundamental difference between a bit-flip error and a phase-flip error in a qubit?
    relevant_lo_ids: ["LO-25-01"]
    reference_answer: |
      A bit-flip error swaps the amplitudes of the qubit states: it changes $|\psi\rangle=\alpha|0\rangle+\beta|1\rangle$ to $\beta|0\rangle+\alpha|1\rangle$. [cite_start]A phase-flip error changes the relative sign between the amplitudes: it changes $|\psi\rangle=\alpha|0\rangle+\beta|1\rangle$ to $\alpha|0\rangle-\beta|1\rangle$[cite: 7].
    conversation_history: []
