  - id: Q015
    question: How exactly does the 3-qubit bit-flip code use ancilla qubits to detect an error without measuring the data?
    relevant_lo_ids: ["LO-25-02"]
    reference_answer: |
      To detect a bit flip without collapsing the state, the code entangles the logical qubit with two ancillary qubits (initialized to |0>) using CNOT gates. We perform parity checks between pairs of qubits (e.g., qubits 1&2 and 2&3). For example, if the received state is alpha|100> + beta|011> (indicating an error on qubit 1), the parity measurement on the ancilla will yield a specific syndrome (like 10) that identifies exactly which qubit flipped, allowing us to apply a Pauli-X gate to correct it.
