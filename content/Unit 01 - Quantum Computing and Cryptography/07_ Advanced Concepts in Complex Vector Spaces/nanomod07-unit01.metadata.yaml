  global_prerequisites:
  - Linear Algebra
  - Complex Numbers
  - Introduction to Programming
  - Python Basics
  - Complex Vector Spaces
  objectives:
  - lo_id: LO-07-01
    summary: Students will understand the definition and meaning of eigenvalues and
      eigenvectors and compute them.
    covered_by:
    - m7-EigenvaluesEigenvectors
    - m7-DefinitionEigenvectorsEigenvalues
    - m7-Quiz-7.1
    - m7-Quiz-7.1-interactive
    learning_objectives:
    - Understand the concept of eigenvalues and eigenvectors
    - Identify examples of eigenvalues and eigenvectors
    - Define eigenvectors and eigenvalues and understand their relationship to complex
      matrices
    - Identify examples of eigenvectors and eigenvalues
    - Compute eigenvectors and eigenvalues for given matrices
    - Verify Hermitian property for given matrices
    - Compute eigenvectors and eigenvalues for given matrices
    - Verify Hermitian property for given matrices
    estimated_time_mins: 56
    concepts:
    - Eigenvalues and Eigenvectors
    - Hermitian Matrices
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-07-02
    summary: Students will prove properties of Hermitian and unitary matrices.
    covered_by:
    - m7-HermitianMatrices
    - m7-Quiz-7.1
    - m7-Quiz-7.1-interactive
    - m7-UnitaryMatrices
    learning_objectives:
    - Understand the definition and properties of Hermitian matrices
    - Identify examples of Hermitian matrices
    - Compute eigenvectors and eigenvalues for given matrices
    - Verify Hermitian property for given matrices
    - Compute eigenvectors and eigenvalues for given matrices
    - Verify Hermitian property for given matrices
    - Understand the definition and properties of unitary matrices
    - Identify examples of unitary matrices
    estimated_time_mins: 56
    concepts:
    - Hermitian Matrices
    - Unitary Matrices
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-07-03
    summary: Students will be able to verify properties of unitary and Hermitian matrices.
    covered_by:
    - m7-Quiz-7.2
    - m7-Quiz-7.2-interactive
    learning_objectives:
    - Verify unitary property for given matrices
    - Prove preservation of inner product under unitary transformation
    - Verify unitary property for given matrices
    - Prove preservation of inner product under unitary transformation
    estimated_time_mins: 25
    concepts:
    - Implications of Unitary Transformations
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-07-04
    summary: Students will know the implication of unitary matrices as transformations
      in quantum computing.
    covered_by:
    - m7-ImplicationUnitaryTransformations
    learning_objectives:
    - Understand the implications of unitary transformations on quantum systems
    - Apply the concept of reversibility to quantum state operations
    estimated_time_mins: 3
    concepts:
    - Implications of Unitary Transformations
    - Unitary Matrices
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-07-05
    summary: Students will be able to implement Python programs that check if a given
      matrix is Hermitian or unitary.
    covered_by:
    - m7-final-quiz
    learning_objectives: []
    estimated_time_mins: 0
    concepts: []
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
