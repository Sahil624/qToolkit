learning_objective_tree:
  title: Complex Numbers on a Plane
  global_prerequisites:
  - Algebra
  - Trigonometry
  - Introduction to Programming
  - Python Basics
  - The Basics of Complex Numbers
  objectives:
  - lo_id: LO-03-01
    summary: Students will be able to represent complex numbers as Cartesian coordinates
      and plot them on the complex plane.
    covered_by:
    - m3-cartesianRepresentation
    learning_objectives:
    - Understand the Cartesian representation of complex numbers
    - Plot complex numbers on the Argand (complex) plane
    - Compute the modulus of complex numbers using Cartesian representation
    estimated_time_mins: 3
    concepts:
    - Cartesian Representation of Complex Number
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-03-02
    summary: Students will be able to represent complex numbers using polar representations
      and plot them on the complex plane.
    covered_by:
    - m3-polarRepresentation
    - m3-polarRepresentationExample
    - m3-multiplicationPolar
    learning_objectives:
    - Understand the polar representation of complex numbers
    - Convert complex numbers from Cartesian to polar representation and vice versa
    - Compute the magnitude and angle of complex numbers in polar representation
    - Understand the polar representation of complex numbers
    - Convert complex numbers from Cartesian to polar representation and vice versa
    - Compute the magnitude and angle of complex numbers in polar representation
    - Understand the process of multiplying complex numbers in polar coordinates
    - Perform multiplication of complex numbers using polar coordinates
    estimated_time_mins: 8
    concepts:
    - Polar Representation of Complex Numbers
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-03-03
    summary: Students will be able to convert back and forth between Cartesian and
      polar representations.
    covered_by:
    - m3-quiz-3.1
    - m3-quiz-3.1-interactive
    learning_objectives:
    - Convert complex numbers from Cartesian to polar representations
    - Convert complex numbers from polar to Cartesian representations
    - Multiply complex numbers using polar representations
    - Convert complex numbers from Cartesian to polar representations
    - Convert complex numbers from polar to Cartesian representations
    - Multiply complex numbers using polar representations
    estimated_time_mins: 25
    concepts:
    - Polar Representation of Complex Numbers
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-03-04
    summary: Students will be able to implement programs that convert between Cartesian
      and polar representations.
    covered_by:
    - m3-final-quiz
    learning_objectives: []
    estimated_time_mins: 0
    concepts: []
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
