learning_objective_tree:
  title: The Basics of Complex Numbers
  global_prerequisites:
  - Algebra
  - Introduction to Programming
  - Python Basics
  objectives:
  - lo_id: LO-01-01
    summary: Students will master the concept of complex number representations.
    covered_by:
    - m1-warmup
    - m1-background
    - m1-imaginaryNumbers
    - m1-quiz-1.1
    - m1-quiz-1.1-interactive
    - m1-complexNumbers
    learning_objectives:
    - Test the Understanding on how to solve quadratic equations with real and complex
      solutions
    - Identify the place of complex numbers within the hierarchy of number systems
    - Discuss the necessity of complex numbers in describing certain physical systems
    - Understand the foundational role of complex numbers in quantum computing and
      cryptography
    - Identify and differentiate between various number systems, leading up to and
      including real numbers
    - Recognize the emergence and necessity of complex numbers in extending the real
      number system
    - Understand the motivation behind the introduction of complex numbers
    - Learn the definition and properties of the imaginary unit i
    - Perform arithmetic operations with imaginary numbers and recognize patterns
      in powers of i
    - Solve quadratic equations involving imaginary numbers
    - Simplify expressions involving powers of the imaginary unit i
    - Solve quadratic equations involving imaginary numbers
    - Simplify expressions involving powers of the imaginary unit i
    - Define complex numbers and understand their composition
    - Identify the real and imaginary parts of a complex number
    - Recognize complex numbers as a broader set of numbers encompassing real and
      imaginary numbers
    estimated_time_mins: 24
    concepts:
    - Complex Numbers
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-01-02
    summary: Students will be able to perform basic additive and multiplicative operations
      on complex numbers.
    covered_by:
    - m1-operationsComplex
    - m1-quiz-1.2
    - m1-quiz-1.2-interactive
    learning_objectives:
    - Perform addition and multiplication operations on complex numbers
    - Understand how to combine real and imaginary parts in arithmetic operations
    - Apply the defined operations to solve problems involving complex numbers
    - Solve quadratic equations with complex solutions
    - Perform addition, multiplication, and scalar multiplication operations on complex
      numbers
    - Apply algebraic methods to complex number operations for solving problems
    - Solve quadratic equations with complex solutions
    - Perform addition, multiplication, and scalar multiplication operations on complex
      numbers
    - Apply algebraic methods to complex number operations for solving problems
    estimated_time_mins: 18
    concepts:
    - Operations on Complex Numbers
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-01-03
    summary: Students will be able to implement Python programs that perform basic
      operations of addition and multiplication on complex numbers.
    covered_by:
    - m1-final-quiz
    learning_objectives: []
    estimated_time_mins: 0
    concepts: []
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
