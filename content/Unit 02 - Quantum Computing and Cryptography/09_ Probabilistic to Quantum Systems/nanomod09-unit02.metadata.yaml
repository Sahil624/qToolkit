learning_objective_tree:
  title: From Probabilistic Systems to Quantum Systems
  global_prerequisites:
  - Basic Probability
  - Linear Algebra
  - Introduction to Quantum Physics
  objectives:
  - lo_id: LO-09-01
    summary: Students will understand the notion of probabilistic systems.
    covered_by:
    - m9-ProbabilisticModel
    learning_objectives:
    - Understand the basics of a classical probabilistic system
    - Learn how to represent the state of a system with a probability vector
    - Grasp the concept of positional notation in the context of probabilistic and
      quantum states
    estimated_time_mins: 1
    concepts:
    - Probabilistic Model and Measurement
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-09-02
    summary: Students will be able to create probability vectors for probabilistic
      systems and apply simple operations on them.
    covered_by:
    - m9-LookingAtTheStateMeasurement
    - m9-quiz-9.1
    - m9-quiz-9.1-interactive
    - m9-Operation
    learning_objectives:
    - Understand how observation (measurement) affects our knowledge of a system's
      state
    - Learn how the probability vector changes upon measurement
    - Realize that measurement leads to a definitive knowledge of the system's state
    - Assess understanding of the representation of probabilistic systems with probability
      vectors
    - Evaluate comprehension of how observation affects the probability vector representation
    - Test ability to construct and modify probability vectors based on system states
      and observations
    - Assess understanding of the representation of probabilistic systems with probability
      vectors
    - Evaluate comprehension of how observation affects the probability vector representation
    - Test ability to construct and modify probability vectors based on system states
      and observations
    - Understand the concept of performing operations on a probabilistic system
    - Learn how operations like NOT and identity can be represented by matrices
    - Comprehend the effect of matrix-vector multiplication on the state of the system
    - Grasp the concept of probabilistic operations and their matrix representation
    estimated_time_mins: 4
    concepts:
    - Operations on Probabilistic Systems
    - Probabilistic Model and Measurement
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-09-03
    summary: Students will understand the notion of qubits and types of operations
      that can be applied to them.
    covered_by:
    - m9-FromClassicalToQuantum
    - m9-ProbabilitiesAndUnitaryMatrices
    - m9-GoingForwardsAndBackwardsInTime
    - m9-quiz-9.2
    - m9-quiz-9.2-interactive
    learning_objectives:
    - Understand the transition from classical to quantum state representations
    - Learn the distinctions between classical and quantum systems, particularly the
      use of complex numbers in quantum states
    - Grasp the concept of quantum states and how their probabilities are determined
      by the modulus squared of the vector elements
    - Comprehend the phenomenon of interference in quantum mechanics
    - Understand the role of complex numbers in quantum state vectors and the importance
      of their modulus squared summing to 1
    - Learn what unitary matrices are and their properties
    - Grasp how unitary matrices are used in quantum mechanics to preserve the probabilistic
      nature of quantum states
    - Understand the concept of time evolution in quantum systems
    - Learn that quantum systems are reversible, and this property is facilitated
      by unitary matrices
    - Grasp how specific matrices can represent transitions forward and backward in
      time within quantum mechanics
    - Identify the nature of elements in vectors representing quantum system states
    - Determine the types of matrices that serve as valid operators for quantum systems
    - Explain the reversibility of quantum systems and the reasoning behind it
    - Identify the nature of elements in vectors representing quantum system states
    - Determine the types of matrices that serve as valid operators for quantum systems
    - Explain the reversibility of quantum systems and the reasoning behind it
    estimated_time_mins: 5
    concepts:
    - Classical to Quantum
    - Probabilities and Unitary Matrices
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-09-04
    summary: Student will understand about the Polarized Photon from a Classroom Experiment
    covered_by:
    - m9-PolarizedPhotonExperiment
    - m9-SecondFilterExperiment
    - m9-ThirdFilterExperiment
    - m9-FilterOrientationExperiment
    - m9-quiz-9.3
    - m9-quiz-9.3-interactive
    learning_objectives:
    - Understand the quantum mechanical properties of photons
    - Learn how polarized photons contribute to quantum cryptography
    - Gain hands-on experience through a simple experiment illustrating the concept
      of a qubit
    - Comprehend the principles of quantum measurement through observation of polarized
      light
    - Predict the effect of adding a second, orthogonal polarizing filter to the experimental
      setup
    - Understand the behavior of polarized light when passing through orthogonal polarizing
      filters
    - Learn about the properties of light and photon polarization in a quantum mechanical
      context
    - Understand the outcome of adding a third filter in between two orthogonal polarizing
      filters and its impact on light intensity
    - Explore the concept of photon polarization from a new perspective involving
      multiple filters
    - Hypothesize about different scenarios regarding the third filter's orientation
      and predict the experimental outcomes
    - Predict the effect of the third filter's orientation on the light intensity
      observed on the screen
    - Understand the phenomenon that allows light to pass through when a third filter
      is introduced at an angle
    - Learn about the dependency of light intensity on the angle of the third filter
      with respect to the first two
    - Determine the optimal angle for the middle filter to achieve maximum screen
      brightness
    - Calculate the angle for the middle filter that results in the screen being about
      half as bright
    - Determine the optimal angle for the middle filter to achieve maximum screen
      brightness
    - Calculate the angle for the middle filter that results in the screen being about
      half as bright
    estimated_time_mins: 31
    concepts:
    - 'The Classroom Experiment: A Polarized Photon'
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-09-05
    summary: Students will understand the notion of modeling light photons as qubits
      and determine some of their basic properties with respect to measurement.
    covered_by:
    - m9-QuantumTheoryAtWork
    - m9-LightIntensityAndTransmissionProbability
    - m9-Conclusions
    learning_objectives:
    - Understand the modeling of photon polarization states using unit vectors
    - Learn how to represent arbitrary polarization states as linear combinations
      of basis states
    - Grasp the concept of probability amplitudes and their role in determining the
      outcome of quantum measurements
    - Explore the principle of superposition in the context of photon polarization
    - Understand the relationship between the angle of photon polarization and the
      transmission probability through a polarizing filter
    - Learn how transmission probability is affected by the photon's alignment with
      the filter's polarization axis
    - Recognize the probabilistic nature of photon transmission and how it relates
      to quantum mechanics
    - Reflect on the parallels between the double slit experiment and the three polarizing
      filters experiment
    - Evaluate the constructed qubit model in comparison to Feynman's explanations
    - Discuss the completeness and potential modifications needed for the qubit model
      to faithfully represent quantum systems
    estimated_time_mins: 9
    concepts:
    - Quantum Theory At Work
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
