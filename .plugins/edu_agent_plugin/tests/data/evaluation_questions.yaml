  - id: Q020
    question: "You mentioned CNOT is unitary. If I put a Hadamard gate before the control qubit of a CNOT, and the input is |00>, what specific state do I get outputted? And is this resulting state entangled?"
    relevant_lo_ids: ["LO-16-01", "LO-16-02"]
    reference_answer: |
      If you apply a Hadamard gate to the control qubit (initialized to |0>) and then a CNOT gate (with the second qubit also initialized to |0>), you generate the Bell state: (|00> + |11>) / sqrt(2). Yes, this resulting state is an entangled pair (specifically an EPR pair), as it cannot be factored into the tensor product of two independent qubit states.
