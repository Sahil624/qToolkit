questions:
  - id: Q001
    question: How does the "Double Lock" analogy explain the security mechanism of the Three-Stage QKD protocol?
    relevant_lo_ids: ["LO-22-01", "LO-22-02"]
    reference_answer: |
      The Double Lock analogy describes a scenario where Alice wants to send a secret message to Bob without exchanging keys. The process is:
      1. Alice locks the message in a strong box with her unique lock and sends it to Bob.
      2. Bob adds his own unique lock to the box and sends it back to Alice.
      3. Alice removes her lock and sends the box back to Bob.
      4. Bob removes his lock and opens the box to read the message.
      This demonstrates how a message can remain secure during transit without the parties ever needing to exchange or reveal their specific keys.
  - id: Q002
    question: How does the "High-tech courier" versus "New type of lock" analogy describe the difference between Quantum Key Distribution (QKD) and Post-Quantum Cryptography (PQC)?
    relevant_lo_ids: ["LO-28-02"]
    reference_answer: |
      QKD is analogous to a high-tech courier system where any attempt to peek inside the box during transit is immediately detected by the laws of physics. In contrast, PQC is like designing a new type of mathematical lock that is so complex that no known "key-picker" (including quantum computers) can open it.
  - id: Q003
    question: Mathematically, why is it impossible to decompose a Bell state, such as \frac{|00\rangle + |11\rangle}{\sqrt{2}}, into a tensor product of two individual qubits?
    relevant_lo_ids: ["LO-16-02", "LO-08-03"]
    reference_answer: |
      If we assume the Bell state can be written as the tensor product of two qubits, expanding the product (\alpha_0|0\rangle + \alpha_1|1\rangle) \otimes (\beta_0|0\rangle + \beta_1|1\rangle) yields coefficients like \alpha_0\beta_0 for |00\rangle and \alpha_0\beta_1 for |01\rangle. For the Bell state, the coefficients for |01\rangle and |10\rangle must be 0, implying either \alpha_0=0 or \beta_1=0. However, for the |00\rangle and |11\rangle terms to be non-zero, all coefficients \alpha_0, \beta_0, \alpha_1, \beta_1 must be non-zero. This creates a mathematical contradiction, proving decomposition is impossible.
  - id: Q004
    question: What is the "Photon Number Splitting" (PNS) attack, and why does it emphasize the need for single photon emitters in BB84?
    relevant_lo_ids: [LO-20-04]
    reference_answer: |
      The PNS attack exploits real-world photon emitters (like attenuated lasers) that sometimes produce more than one photon in a single pulse. If a pulse contains multiple photons, Eve can siphon off one photon to measure later and let the other pass to Bob. This allows Eve to steal information without introducing errors in the quantum bit error rate (QBER) or being detected.
  - id: Q005
    question: In the context of the B92 protocol, why are the measurement results of observing a \rightarrow (0 degrees) in the + (rectilinear) basis considered inconclusive?
    relevant_lo_ids: ["LO-21-01", "LO-21-03"]
    reference_answer: |
      In B92, Alice transmits either \rightarrow (0°) or \nearrow (45°). If Bob measures in the + basis, a \rightarrow observation is inconclusive because it could result from Alice sending a \rightarrow photon (which passes the filter) or from Alice sending a \nearrow photon (which has a probability of passing the rectilinear filter). Bob cannot distinguish which bit was sent in this specific case.
  - id: Q006
    question: How does the 3-qubit bit-flip error correction code protect a quantum state |\psi\rangle = \alpha|0\rangle + \beta|1\rangle?
    relevant_lo_ids: ["LO-25-02"]
    reference_answer: |
      The code introduces redundancy by entangling the original qubit with two ancillary qubits using CNOT gates, mapping the logical |0\rangle to |000\rangle and |1\rangle to |111\rangle. If a bit-flip error occurs, the receiver uses parity checks between pairs of qubits (e.g., qubits 1&2 and 2&3) to identify which specific qubit flipped without measuring the actual state values \alpha and \beta, thus preserving the superposition.
  - id: Q007
    question: What are the three fundamental facts that provide security in Quantum Key Distribution (QKD) protocols?
    relevant_lo_ids: ["LO-20-01", "LO-19-03"]
    reference_answer: |
      The security of QKD relies on:
      1. The No-Cloning Theorem, which ensures an unknown quantum state cannot be copied.
      2. The fact that measurement in the wrong basis disturbs the qubit.
      3. The fact that non-orthogonal qubit states cannot be reliably distinguished from one another.
  - id: Q008
    question: Describe the procedure for calculating the tensor product of two matrices, A and B, as defined in the notes.
    relevant_lo_ids: ["LO-08-01", "LO-08-05"]
    reference_answer: |
      The tensor product $A \otimes B$ is calculated by taking every individual element of the first matrix ($A$) and scalar multiplying it with the entire second matrix ($B$). This results in a larger block matrix containing these scaled sub-matrices.
  - id: Q009
    question: In the Three-Stage QKD protocol, what specific condition must the secret rotation transformations U_a (Alice's) and U_b (Bob's) satisfy?
    relevant_lo_ids: ["LO-22-02"]
    reference_answer: |
      The secret rotation transformations must be commutative, meaning they must satisfy the condition U_a U_b = U_b U_a. This allows the sequence of rotations and inverse rotations to successfully retrieve the original state regardless of the order in which they were applied.
  - id: Q010
    question: What is the difference between "Global Phase" and "Relative Phase" in a qubit, and which one has physical significance?
    relevant_lo_ids: ["LO-11-04"]
    reference_answer: |
      A global phase is a complex number c = e^{i\phi} multiplying the entire qubit state (e.g., c(\alpha|0\rangle + \beta|1\rangle)) and has no physical meaning or measurable effect. A relative phase is a complex factor acting on only one component of the superposition (e.g., \alpha|0\rangle + e^{i\phi}\beta|1\rangle); it distinguishes unique quantum states and can affect measurement outcomes.
  - id: Q011
    question: Using the classroom experiment with polarizing filters, what happens to the light intensity if a third filter polarized at 45 degrees is placed between a vertical filter and a horizontal filter?
    relevant_lo_ids: ["LO-09-04"]
    reference_answer: |
      If a vertical filter and a horizontal filter are placed sequentially, no light passes through. However, inserting a 45 degree filter in the middle allows light to pass. The vertical filter polarizes the light vertically; the 45 degree filter transmits half of those photons (re-polarizing them to 45 degrees), and the final horizontal filter transmits half of those remaining photons. Thus, the screen becomes bright rather than dark.
  - id: Q012
    question: What is the main difference between how QKD and Post-Quantum Cryptography (PQC) secure data?
    relevant_lo_ids: ["LO-28-02"]
    reference_answer: |
      QKD is physics-based, guaranteeing security through the laws of quantum mechanics (detecting disturbances). Post-Quantum Cryptography (PQC) is math-based, relying on new mathematical problems (like lattice problems) that are believed to be hard even for quantum computers to solve.
  - id: Q013
    question: Why is the random sending time so critical for it?
    relevant_lo_ids: ["LO-24-01"]
    reference_answer: |
      In the Goldenberg-Vaidman (GV) protocol, the random sending time $t_s$ is critical to prevent a specific intercept-resend attack. If Eve knew the transmission time, she could intercept the first wave packet |a>, send a fake one to Bob, and hold the real one. When the second packet |b> arrives, she could measure the combined state to distinguish the bit, and then forge the correct packet for Bob. Randomizing $t_s$ prevents Eve from delaying the signal without being detected.
