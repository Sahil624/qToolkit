learning_objective_tree:
  title: Multiple Qubits and Entangled Systems
  global_prerequisites:
  - Linear Algebra
  - Quantum Mechanics Fundamentals
  - Quantum State Representation
  objectives:
  - lo_id: LO-16-01
    summary: Students will be able to create joint state representations of quantum
      systems with multiple qubits.
    covered_by:
    - m16-TwoQubitSystems
    - m16-Measurement
    - m16-PartialMeasurement
    - m16-PartialMeasurementExample
    - m16-quiz-16.1
    learning_objectives:
    - Understand the concept of superposition in two-qubit systems
    - Learn how to represent the state of a two-qubit system in superposition
    - Grasp the potential states a two-qubit system can occupy based on the superposition
      principle
    - Calculate the probabilities of different outcomes when measuring two-qubit systems
    - Understand the concept of state collapse upon measurement in quantum mechanics
    - Determine the new state of a two-qubit system after measurement
    - Understand the process and implications of performing a partial measurement
      on a two-qubit system
    - Calculate the probability of observing a specific outcome for one qubit while
      ignoring the other
    - Determine and normalize the new state of the system after a partial measurement
    - Apply the partial measurement process to a specific quantum state example
    - Calculate the new state of the quantum system based on the outcome of a partial
      measurement
    - Demonstrate the normalization process for the new state after partial measurement
    - Compute the measurement probability for all possible outcomes of given quantum
      states
    - Determine the probability of outcomes and the final state of the system after
      a partial measurement of the first qubit
    - Calculate the probabilities of outcomes and the final state after measuring
      the second qubit for specific quantum states
    estimated_time_mins: 7
    concepts:
    - Measurement
    - Two Qubit Systems
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-16-02
    summary: Students will understand the notion of entangled quantum systems.
    covered_by:
    - m16-EntangledSystems
    - m16-snakesAndLadderGame
    - m16-snakesAndLadderGameCode
    learning_objectives:
    - Understand the concept of entanglement in quantum systems involving multiple
      qubits
    - Learn how to represent the state of a composite system as a tensor product of
      individual qubit states
    - Grasp the significance of entanglement in quantum computing and information
      theory
    estimated_time_mins: 1
    concepts:
    - Entangled Systems
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-16-03
    summary: Students will be able to perform measurements on joint quantum states.
    covered_by:
    - m16-ReverseQuestionDecomposition
    - m16-MeasuringTheBellState
    - m16-quiz-16.2
    learning_objectives:
    - Investigate the possibility of decomposing a general two-qubit state into the
      tensor product of two individual qubit states
    - Understand through an example that such decomposition is not always possible
    - Learn the specific case of the Bell state and why it represents an entangled
      system that defies simple decomposition
    - Understand the phenomenon of entanglement through the example of measuring a
      Bell state
    - Learn about the implications of quantum measurement on entangled particles,
      regardless of distance
    - Grasp the historical context and resolution of the apparent contradiction between
      entanglement and the theory of relativity
    - Evaluate the dependency of entanglement on the decomposition of the quantum
      system
    - Analyze a given four-qubit state to determine entanglement with respect to different
      decompositions
    - Assess the entanglement status of a specific quantum state
    estimated_time_mins: 4
    concepts:
    - Measuring Bell State
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-16-04
    summary: Students will be able to perform partial-measurements on joint quantum
      states.
    covered_by: []
    learning_objectives: []
    estimated_time_mins: 0
    concepts: []
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
