learning_objective_tree:
  title: The EPR Paradox and CHSH Game
  global_prerequisites:
  - Quantum Mechanics Fundamentals
  - Linear Algebra
  - Probability
  objectives:
  - lo_id: LO-17-01
    summary: Students will understand the significance of EPR pairs and their implications.
    covered_by:
    - m17-EPRParadox
    - m17-EntanglementAndSeparation
    learning_objectives:
    - Understand the concept of changing the basis of Bell pairs and its significance
    - Learn how to express a Bell state in the Hadamard basis
    - Grasp the mathematical transformation involved in changing the basis of a Bell
      pair
    - Explore the persistence of entanglement in physically separated qubits
    - Analyze the implications of basis change on the measurement outcomes of entangled
      qubits
    - Understand that the consistent outcomes across different bases support the entanglement
      of qubits
    estimated_time_mins: 2
    concepts:
    - EPR Paradox
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
  - lo_id: LO-17-02
    summary: Students will understand Bell's inequality and CHSH game that verifies
      Bell's inequality.
    covered_by:
    - m17-RotationalInvarianceOfBellState
    - m17-CHSHInequality
    - m17-QuantumAdvantageCHSH
    - m17-CHSHGameStrategy
    - m17-CHSHGameOutcome
    learning_objectives:
    - Understand the concept of rotational invariance in the context of Bell states
    - Learn the implications of measuring qubits in a Bell pair in different bases
    - Grasp the correlation between measurement outcomes of entangled qubits in various
      bases
    - Understand the CHSH inequality and its foundations in disproving hidden variable
      theories
    - Learn the setup of the CHSH game involving Alice and Bob and the rules governing
      their inputs and outputs
    - Grasp the implications of CHSH inequality for classical and quantum scenarios
    - Explore the possibility of surpassing classical limits in the CHSH game using
      quantum mechanics
    - Understand how sharing a Bell pair enables Alice and Bob to achieve a higher
      probability of winning
    - Learn the quantum strategy that provides an advantage over classical scenarios
      in the CHSH game
    - Detail the strategy used by Alice and Bob in the CHSH game involving the choice
      of measurement bases
    - Understand the significance of the chosen bases for measuring qubits in the
      context of the CHSH game
    - Grasp the coordinated approach between Alice and Bob to maximize their probability
      of winning in a quantum scenario
    - Explain the outcome of the CHSH game in terms of measurement outputs and the
      achieved winning probability
    - Understand why Alice and Bob meet the condition on outputs with a high probability
      using quantum strategies
    - Grasp the significance of the bases' angle displacement in maximizing the winning
      probability
    estimated_time_mins: 5
    concepts:
    - CHSH Inequality
    - Rotational Invariance
    prerequisites: []
    kolb_phase: null
    difficulty: intermediate
    content_type: mixed
